<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aurora Photography</title>
    <meta name="description"
        content="Sign in to your Aurora Photography account. Access your portfolio, bookings, and more.">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@200;300;400&display=swap"
        rel="stylesheet">

    <!-- Main Style -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page-body">

    <div class="auth-page-container">
        <div class="auth-card auth-glass">
            <a href="../home2.html" class="auth-close" aria-label="Back to Home">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </a>
            <div class="auth-header">
                <a href="../home2.html" class="auth-logo">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="brand-icon-large">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="3" />
                        <path d="M30 70 L50 30 L70 70 M40 55 L60 55" fill="none" stroke="currentColor"
                            stroke-width="3" />
                    </svg>
                    <span class="brand-text-large">AURORA</span>
                </a>
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Sign in to your account</p>
            </div>

            <form class="auth-form" id="loginForm" novalidate>

                <!-- Role Toggle -->
                <div class="role-toggle-group">
                    <p class="role-toggle-label">Login as</p>
                    <div class="role-toggle-tabs" role="radiogroup" aria-label="Select login role">
                        <button type="button" class="role-tab active" id="roleUser" data-role="user"
                            onclick="selectRole('user')" aria-pressed="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            User
                        </button>
                        <button type="button" class="role-tab" id="roleAdmin" data-role="admin"
                            onclick="selectRole('admin')" aria-pressed="false">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path
                                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z">
                                </path>
                            </svg>
                            Admin
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control premium-input"
                        placeholder="name@example.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" class="form-control premium-input"
                            placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" style="display:none;">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M1 1l22 22">
                                </path>
                                <path
                                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Error message -->
                <div class="auth-error" id="loginError" role="alert" aria-live="polite"></div>

                <div class="auth-options">
                    <a href="forgot-password.html" class="forgot-password-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn full-width auth-btn" id="loginSubmitBtn">
                    <span class="btn-text">Log In</span>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"></path>
                    </svg>
                </button>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/navbar.js" defer></script>
    <script src="../js/main.js"></script>
    <script>
        // ── Role state ──────────────────────────────────────
        let selectedRole = 'user';

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('roleUser').classList.toggle('active', role === 'user');
            document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');
            document.getElementById('roleUser').setAttribute('aria-pressed', role === 'user');
            document.getElementById('roleAdmin').setAttribute('aria-pressed', role === 'admin');
            // Clear any error when role changes
            clearError();
        }

        // ── Error helpers ────────────────────────────────────
        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.add('visible');
        }
        function clearError() {
            const el = document.getElementById('loginError');
            el.textContent = '';
            el.classList.remove('visible');
        }

        // ── Form submission ──────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            clearError();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            // Basic validation — accept any non-empty values
            if (!email) {
                showError('Please enter your email address.');
                document.getElementById('loginEmail').focus();
                return;
            }
            if (!email.includes('@')) {
                showError('Please enter a valid email address.');
                document.getElementById('loginEmail').focus();
                return;
            }
            if (!password) {
                showError('Please enter your password.');
                document.getElementById('loginPassword').focus();
                return;
            }

            // Admin credentials validation
            if (selectedRole === 'admin') {
                const ADMIN_EMAIL = 'admin@gmail.com';
                const ADMIN_PASSWORD = 'admin123';

                if (email !== ADMIN_EMAIL || password !== ADMIN_PASSWORD) {
                    showError('Invalid Admin Credentials');
                    return;
                }
            }

            // Store auth info in localStorage
            localStorage.setItem('aurora_role', selectedRole);
            localStorage.setItem('aurora_email', email);
            localStorage.setItem('aurora_auth', 'true');

            // Redirect based on role
            if (selectedRole === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'user-dashboard.html';
            }
        });

        // ── Password toggle ──────────────────────────────────
        const toggleBtn = document.querySelector('.password-toggle');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', function () {
                const input = document.getElementById('loginPassword');
                const eyeOpen = this.querySelector('.eye-open');
                const eyeClosed = this.querySelector('.eye-closed');
                if (input.type === 'password') {
                    input.type = 'text';
                    eyeOpen.style.display = 'none';
                    eyeClosed.style.display = 'block';
                } else {
                    input.type = 'password';
                    eyeOpen.style.display = 'block';
                    eyeClosed.style.display = 'none';
                }
            });
        }

        // Clear error on input
        document.getElementById('loginEmail').addEventListener('input', clearError);
        document.getElementById('loginPassword').addEventListener('input', clearError);
    </script>
</body>

</html>
